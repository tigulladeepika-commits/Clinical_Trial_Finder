<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f4f7fb"/>
  <text x="72" y="60" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#16324f">Clinical Trial Finder - Screen Guide</text>
  <text x="72" y="92" font-family="Arial, sans-serif" font-size="15" fill="#557089">A simplified view of the main user interface and the information each area presents.</text>

  <rect x="60" y="120" width="1080" height="580" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="2"/>
  <rect x="60" y="120" width="1080" height="58" rx="24" fill="#133a63"/>
  <rect x="60" y="154" width="1080" height="24" fill="#133a63"/>
  <circle cx="92" cy="149" r="6" fill="#8dd3ff"/>
  <circle cx="112" cy="149" r="6" fill="#7cf5b1"/>
  <circle cx="132" cy="149" r="6" fill="#ffd166"/>
