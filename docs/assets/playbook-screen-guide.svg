  <text x="935" y="154" font-family="Arial, sans-serif" font-size="13" fill="#d5e5f5">Find trials | Explore sites | View on map</text>

  <rect x="96" y="206" width="1008" height="120" rx="18" fill="#f8fbfe" stroke="#dfe7ef"/>
  <text x="116" y="235" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a3f68">1. Search area</text>

  <rect x="116" y="248" width="310" height="46" rx="10" fill="#ffffff" stroke="#bfd1e2"/>
  <text x="130" y="276" font-family="Arial, sans-serif" font-size="14" fill="#4d6378">Condition / Disease</text>

  <rect x="440" y="248" width="120" height="46" rx="10" fill="#ffffff" stroke="#bfd1e2"/>
  <text x="474" y="276" font-family="Arial, sans-serif" font-size="14" fill="#4d6378">City</text>

  <rect x="574" y="248" width="100" height="46" rx="10" fill="#ffffff" stroke="#bfd1e2"/>
  <text x="603" y="276" font-family="Arial, sans-serif" font-size="14" fill="#4d6378">State</text>

  <rect x="688" y="248" width="120" height="46" rx="10" fill="#ffffff" stroke="#bfd1e2"/>
  <text x="724" y="276" font-family="Arial, sans-serif" font-size="14" fill="#4d6378">Phase</text>

  <rect x="822" y="248" width="120" height="46" rx="10" fill="#ffffff" stroke="#bfd1e2"/>
  <text x="856" y="276" font-family="Arial, sans-serif" font-size="14" fill="#4d6378">Status</text>

  <rect x="956" y="248" width="128" height="46" rx="10" fill="#2268c5"/>
  <text x="984" y="276" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Search</text>

  <rect x="96" y="350" width="456" height="318" rx="18" fill="#fbfcfe" stroke="#dfe7ef"/>
  <text x="116" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a3f68">2. Results panel</text>
  <text x="116" y="404" font-family="Arial, sans-serif" font-size="13" fill="#62798f">Trial cards show NCT ID, title, status, phase, and site count.</text>

  <rect x="116" y="426" width="416" height="68" rx="12" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="132" y="446" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2c73d2">NCT00000001</text>
  <text x="132" y="468" font-family="Arial, sans-serif" font-size="14" fill="#22384e">Trial title example for Diabetes</text>
  <rect x="132" y="478" width="90" height="20" rx="10" fill="#e7f5eb"/>
  <text x="150" y="492" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#2a8a52">Recruiting</text>
  <rect x="232" y="478" width="72" height="20" rx="10" fill="#eef3ff"/>
  <text x="252" y="492" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3b5cb5">Phase 2</text>
  <rect x="314" y="478" width="72" height="20" rx="10" fill="#f2f5f8"/>
  <text x="336" y="492" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#5d7083">8 sites</text>

  <rect x="116" y="510" width="416" height="68" rx="12" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="132" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2c73d2">NCT00000002</text>
  <text x="132" y="552" font-family="Arial, sans-serif" font-size="14" fill="#22384e">Trial title example for Breast Cancer</text>
  <rect x="132" y="562" width="116" height="20" rx="10" fill="#eef3ff"/>
  <text x="149" y="576" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3b5cb5">Active, not recruiting</text>
  <rect x="258" y="562" width="72" height="20" rx="10" fill="#eef3ff"/>
  <text x="279" y="576" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3b5cb5">Phase 3</text>

  <rect x="116" y="594" width="416" height="54" rx="12" fill="#1f6fdd"/>
  <text x="246" y="626" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Load more trials</text>

  <rect x="576" y="350" width="528" height="318" rx="18" fill="#fbfcfe" stroke="#dfe7ef"/>
  <text x="596" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a3f68">3. Detail panel</text>
  <text x="596" y="404" font-family="Arial, sans-serif" font-size="13" fill="#62798f">The selected trial expands into a summary header, map, and site list.</text>

  <rect x="596" y="424" width="488" height="54" rx="12" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="614" y="447" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2c73d2">NCT00000001</text>
  <text x="614" y="468" font-family="Arial, sans-serif" font-size="14" fill="#22384e">Selected trial title and sponsor summary</text>

  <rect x="596" y="492" width="488" height="108" rx="14" fill="#deefff" stroke="#c7dbef"/>
  <text x="614" y="518" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a3f68">4. Map and location review</text>
  <rect x="620" y="528" width="440" height="54" rx="10" fill="#ffffff" stroke="#c7dbef"/>
  <circle cx="700" cy="556" r="7" fill="#2aa357"/>
  <circle cx="810" cy="548" r="7" fill="#2c73d2"/>
  <circle cx="900" cy="563" r="7" fill="#7f4ad8"/>
  <text x="638" y="570" font-family="Arial, sans-serif" font-size="13" fill="#4d6378">Interactive map with colored study-site markers</text>

  <rect x="596" y="614" width="236" height="34" rx="10" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="612" y="636" font-family="Arial, sans-serif" font-size="13" fill="#4d6378">Location card: Boston, MA</text>
  <rect x="848" y="614" width="236" height="34" rx="10" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="864" y="636" font-family="Arial, sans-serif" font-size="13" fill="#4d6378">Location card: Chicago, IL</text>
</svg>
